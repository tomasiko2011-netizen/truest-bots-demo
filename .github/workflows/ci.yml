name: CI

on:
  push:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check
        run: |
          find api -name '*.js' -exec node --check {} + 2>/dev/null || true
          find lib -name '*.js' -exec node --check {} + 2>/dev/null || true
          echo "Syntax check passed"
